<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Gerador de Senhas - Crie senhas seguras online</title>
</head>
<body>
    <main>

        <section class="hero">
            <h1 class="title">Gerador de Senhas</h1>
            <p class="subtitle">Utilize o gerador online para criar uma senha forte e segura.</p>
        </section>
        

        <section class="box">
            <div class="password">
                <div class="text">
                    <input type="text" name="password" id="password" readonly/>
                </div>
                <div class="actions">
                    <button id="renew">
                        <img src="assets/reset.png" width="55"/>
                    </button>
                </div>
            </div>
            <div class="security-indicator">
                <div id="security-indicator-bar" class="bar safe"></div>
            </div>
        </section>


        <section class="box customize">
            <h3 class="title">Personalizar</h3>
            <div class="actions">
                <div class="password-length">
                    <p>Tamanho: <span id="password-length-text">16</span></p>
                    <input
                        type="range" 
                        name="password-length" 
                        id="password-length" 
                        class="slider"
                        value="16"
                        min="4" 
                        max="64"
                    />
                </div>
                <div class="config">
                    <label  class="checkbox-container">
                        <span class="text">Maiúsculas</span>
                        <input type="checkbox" id="uppercase-checkbox" checked/>
                        <span class="checkmark"></span>
                    </label>
                    <label  class="checkbox-container">
                        <span class="text">Números</span>
                        <input type="checkbox" id="numbers-checkbox" checked/>
                        <span class="checkmark"></span>
                    </label>
                    <label  class="checkbox-container">
                        <span class="text">Símbolos</span>
                        <input type="checkbox" id="symbols-checkbox" checked/>
                        <span class="checkmark"></span>
                    </label>
                </div>
            </div>
        </section>


        <div class="submit">
            <button id="copy-2">Copiar Senha</button>
        </div>

    </main>
    <script src="js/script.js"></script>
</body>
</html>
